<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala Diaconal 2026 — Família Renovada Zona Sul</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --border: #e2ddd6;
    --text: #1c1a17;
    --muted: #7a7469;
    --accent: #4a3728;

    --p0-bg: #e8f0fa; --p0-c: #1a3a6b; --p0-dot: #2d6abf;
    --p1-bg: #e4f5ed; --p1-c: #0f4a2e; --p1-dot: #1a8a52;
    --p2-bg: #eeebfd; --p2-c: #2d1f7a; --p2-dot: #5b4dd4;
    --p3-bg: #fdeee8; --p3-c: #6b2010; --p3-dot: #c84220;
    --p4-bg: #fdf3e3; --p4-c: #5a3005; --p4-dot: #c47a10;
    --w0-bg: #fceef4; --w0-c: #6b1a38; --w0-dot: #c43c70;
    --w1-bg: #edf7e4; --w1-c: #1f4a10; --w1-dot: #3a8a1a;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 4rem;
  }

  header {
    background: var(--accent);
    color: #f7f4ef;
    padding: 2rem 2rem 1.8rem;
    text-align: center;
  }
  header h1 {
    font-family: 'Lora', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 600;
    letter-spacing: 0.01em;
    margin-bottom: 0.3rem;
  }
  header p {
    font-size: 0.85rem;
    opacity: 0.7;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .container { max-width: 720px; margin: 0 auto; padding: 0 1rem; }

  .legend {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.4rem;
    margin: 1.5rem 0 1.2rem;
  }
  .legend-title {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 0.9rem;
    font-weight: 500;
  }
  .legend-grid { display: flex; flex-wrap: wrap; gap: 8px 16px; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 0.82rem; color: var(--text); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .legend-sq  { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  .month-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 1.2rem;
  }
  .mbtn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    background: var(--surface);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .mbtn:hover { border-color: var(--accent); color: var(--accent); }
  .mbtn.on { background: var(--accent); color: #f7f4ef; border-color: var(--accent); font-weight: 500; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
    margin-bottom: 1.2rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 13px;
  }
  .stat-name { font-size: 0.72rem; color: var(--muted); margin-bottom: 3px; line-height: 1.3; }
  .stat-num  { font-size: 1.35rem; font-weight: 500; color: var(--text); }
  .stat-num span { font-size: 0.72rem; font-weight: 400; color: var(--muted); }

  .schedule-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.87rem; }
  thead th {
    padding: 10px 14px;
    text-align: left;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    background: #faf8f5;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #faf8f5; }
  tbody td { padding: 10px 14px; color: var(--text); }
  .td-date { font-weight: 500; font-family: 'Lora', serif; font-size: 0.92rem; }
  .td-day  { color: var(--muted); font-size: 0.82rem; }
  .td-ord  { color: var(--muted); font-size: 0.78rem; }

  .badge {
    display: inline-block;
    padding: 3px 11px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 500;
    white-space: nowrap;
  }

  .note {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 1rem;
    padding: 0 0.2rem;
    line-height: 1.6;
  }

  .footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
</style>
</head>

</div>

<script>
const P=[
  {l:'Eduardo & Aparecida', bg:'var(--p0-bg)', c:'var(--p0-c)', dot:'var(--p0-dot)'},
  {l:'Lauro & Júlia',        bg:'var(--p1-bg)', c:'var(--p1-c)', dot:'var(--p1-dot)'},
  {l:'Luiz & Janaina',      bg:'var(--p2-bg)', c:'var(--p2-c)', dot:'var(--p2-dot)'},
  {l:'Thomas & Francisca',  bg:'var(--p3-bg)', c:'var(--p3-c)', dot:'var(--p3-dot)'},
  {l:'Manassés & Jailma',   bg:'var(--p4-bg)', c:'var(--p4-c)', dot:'var(--p4-dot)'},
];
const W=[
  {l:'Dolores', bg:'var(--w0-bg)', c:'var(--w0-c)', dot:'var(--w0-dot)'},
  {l:'Maria',   bg:'var(--w1-bg)', c:'var(--w1-c)', dot:'var(--w1-dot)'},
];
const MN=['Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const ORD=['1ª','2ª','3ª','4ª','5ª'];

const leg=document.getElementById('leg');
P.forEach(x=>{
  leg.innerHTML+=`<span class="legend-item"><span class="legend-dot" style="background:${x.dot};"></span>${x.l}</span>`;
});
W.forEach(x=>{
  leg.innerHTML+=`<span class="legend-item"><span class="legend-sq" style="background:${x.dot};"></span>${x.l} (quarta)</span>`;
});

function getDates(yr,mo,wd){
  const r=[],d=new Date(yr,mo,1);
  while(d.getDay()!==wd) d.setDate(d.getDate()+1);
  while(d.getMonth()===mo){r.push(new Date(d));d.setDate(d.getDate()+7);}
  return r;
}
function fmt(d){return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0');}

function buildMonth(mi){
  const m=mi+3;
  const e=[];
  getDates(2026,m,2).forEach((d,i)=>e.push({d,day:'Terça',   ord:ORD[i],type:'p',idx:i<4?i:4}));
  getDates(2026,m,3).forEach((d,i)=>e.push({d,day:'Quarta',  ord:ORD[i],type:'w',idx:i%2}));
  getDates(2026,m,0).forEach((d,i)=>e.push({d,day:'Domingo', ord:ORD[i],type:'p',idx:i<4?i:4}));
  e.sort((a,b)=>a.d-b.d);
  return e;
}

const nav=document.getElementById('mnav');
let cur=0;
function setActive(i){nav.querySelectorAll('button').forEach((b,j)=>{b.classList.toggle('on',j===i);});}
MN.forEach((m,i)=>{
  const btn=document.createElement('button');
  btn.textContent=m; btn.className='mbtn';
  btn.addEventListener('click',()=>{cur=i;setActive(i);render(i);});
  nav.appendChild(btn);
});
setActive(0);

function render(mi){
  const rows=buildMonth(mi);
  const sb=document.getElementById('sb');
  sb.innerHTML='';
  const counts={};
  P.forEach((_,i)=>counts['p'+i]=0);
  W.forEach((_,i)=>counts['w'+i]=0);

  rows.forEach(e=>{
    const s=e.type==='p'?P[e.idx]:W[e.idx];
    counts[e.type+e.idx]=(counts[e.type+e.idx]||0)+1;
    const isRes=e.type==='p'&&e.idx===4;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td class="td-date">${fmt(e.d)}</td>
      <td class="td-day">${e.day}</td>
      <td class="td-ord">${e.ord}</td>
      <td><span class="badge" style="background:${s.bg};color:${s.c};">${s.l}${isRes?' *':''}</span></td>
    `;
    sb.appendChild(tr);
  });

  const st=document.getElementById('stats');
  st.innerHTML='';
  [...P.map((x,i)=>({...x,cnt:counts['p'+i],res:i===4})),...W.map((x,i)=>({...x,cnt:counts['w'+i],res:false}))]
    .forEach(x=>{
      const div=document.createElement('div');
      div.className='stat-card';
      div.innerHTML=`<div class="stat-name">${x.l}${x.res?' *':''}</div><div class="stat-num">${x.cnt}<span> cultos</span></div>`;
      st.appendChild(div);
    });
}
render(0);
</script>
