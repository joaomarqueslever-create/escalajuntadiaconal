<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala da Junta Diaconal 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2ede6;--card:#ffffff;--border:#ddd7ce;--text:#1a1714;--muted:#8a8278;
  --gold:#b8894a;--dark:#2c2218;
  --p0-bg:#eaf2fc;--p0-c:#153d78;--p0-dot:#2060c0;
  --p1-bg:#e6f5ed;--p1-c:#0d4428;--p1-dot:#178048;
  --p2-bg:#ede8fc;--p2-c:#281870;--p2-dot:#5040cc;
  --p3-bg:#fceae4;--p3-c:#651a0e;--p3-dot:#c03818;
  --p4-bg:#fdf1e0;--p4-c:#542c04;--p4-dot:#b87010;
  --w0-bg:#fce8f2;--w0-c:#641530;--w0-dot:#c03468;
  --w1-bg:#eaf6e2;--w1-c:#1a4610;--w1-dot:#368218;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:4rem}
header{background:var(--dark);color:#f2ede6;padding:2.5rem 1.5rem 2.2rem;text-align:center;position:relative;overflow:hidden}
header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(184,137,74,0.04) 40px,rgba(184,137,74,0.04) 80px);pointer-events:none}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.logo-wrap{margin-bottom:1rem}
.logo-wrap img{height:80px;width:auto;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.4))}
header h1{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,5vw,2.2rem);font-weight:700;letter-spacing:0.02em;margin-bottom:0.25rem;color:#f2ede6}
.header-sub{font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);font-weight:500}
.container{max-width:740px;margin:0 auto;padding:0 1rem}
.month-nav{display:flex;flex-wrap:wrap;gap:6px;margin:1.5rem 0 1rem}
.mbtn{padding:6px 15px;border:1px solid var(--border);border-radius:20px;font-size:0.78rem;font-family:'Inter',sans-serif;cursor:pointer;background:var(--card);color:var(--muted);transition:all 0.15s;font-weight:400;letter-spacing:0.02em}
.mbtn:hover{border-color:var(--gold);color:var(--dark)}
.mbtn.on{background:var(--dark);color:var(--gold);border-color:var(--dark);font-weight:500}
.legend{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.1rem 1.3rem;margin-bottom:1rem}
.legend-title{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:0.8rem;font-weight:500}
.legend-grid{display:flex;flex-wrap:wrap;gap:8px 18px}
.legend-item{display:flex;align-items:center;gap:7px;font-size:0.8rem;color:var(--text)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sq{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:1rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.stat-name{font-size:0.68rem;color:var(--muted);margin-bottom:4px;line-height:1.3}
.stat-num{font-size:1.3rem;font-weight:500;color:var(--text)}
.stat-num span{font-size:0.68rem;font-weight:400;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.card-header{padding:10px 16px;background:#faf7f3;border-bottom:1px solid var(--border);display:grid;grid-template-columns:90px 80px 50px 1fr;gap:8px}
.card-header span{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);font-weight:500}
.row{display:grid;grid-template-columns:90px 80px 50px 1fr;gap:8px;padding:11px 16px;border-bottom:1px solid #f0ebe3;align-items:center;transition:background 0.1s}
.row:last-child{border-bottom:none}
.row:hover{background:#faf7f3}
.r-date{font-weight:500;font-family:'Playfair Display',serif;font-size:0.92rem;color:var(--text)}
.r-day{font-size:0.8rem;color:var(--muted)}
.r-ord{font-size:0.75rem;color:var(--muted)}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:0.76rem;font-weight:500;white-space:nowrap}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:0.2rem 0}
.hoje-badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:0.65rem;background:#fdf1e0;color:#b87010;font-weight:500;margin-left:6px;vertical-align:middle}
.note{font-size:0.72rem;color:var(--muted);margin-top:0.8rem;padding:0 0.2rem;line-height:1.6}
footer{text-align:center;margin-top:3rem;font-size:0.68rem;color:var(--muted);letter-spacing:0.06em}
</style>
</head>

  <h1>Escala da Junta Diaconal</h1>
  <p class="header-sub">Março &mdash; Dezembro &bull; 2026</p>
</header>

<div class="container">
  <div class="month-nav" id="mnav"></div>
  <div class="legend">
    <div class="legend-title">Duplas escaladas</div>
    <div class="legend-grid" id="leg"></div>
  </div>
  <div class="stats-row" id="stats"></div>
  <div class="card">
    <div class="card-header">
      <span>Data</span><span>Dia</span><span>Sem.</span><span>Portaria</span>
    </div>
    <div id="rows"></div>
  </div>
  <p class="note" id="note"></p>
</div>

<footer>Junta Diaconal &bull; 2026</footer>

<script>
const P=[
  {l:'Eduardo & Aparecida',bg:'var(--p0-bg)',c:'var(--p0-c)',dot:'var(--p0-dot)'},
  {l:'Lauro & Júlia',      bg:'var(--p1-bg)',c:'var(--p1-c)',dot:'var(--p1-dot)'},
  {l:'Luiz & Janaina',     bg:'var(--p2-bg)',c:'var(--p2-c)',dot:'var(--p2-dot)'},
  {l:'Thomas & Francisca', bg:'var(--p3-bg)',c:'var(--p3-c)',dot:'var(--p3-dot)'},
  {l:'Manassés & Jailma',  bg:'var(--p4-bg)',c:'var(--p4-c)',dot:'var(--p4-dot)'},
];
const W=[
  {l:'Dolores',bg:'var(--w0-bg)',c:'var(--w0-c)',dot:'var(--w0-dot)'},
  {l:'Maria',  bg:'var(--w1-bg)',c:'var(--w1-c)',dot:'var(--w1-dot)'},
];
const MN=['Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const ORD=['1ª','2ª','3ª','4ª','5ª'];
const TODAY=new Date(2026,2,15);

const leg=document.getElementById('leg');
P.forEach(x=>leg.innerHTML+=`<span class="legend-item"><span class="dot" style="background:${x.dot}"></span>${x.l}</span>`);
W.forEach(x=>leg.innerHTML+=`<span class="legend-item"><span class="sq" style="background:${x.dot}"></span>${x.l} (quarta)</span>`);

function getDates(yr,mo,wd){
  const r=[],d=new Date(yr,mo,1);
  while(d.getDay()!==wd)d.setDate(d.getDate()+1);
  while(d.getMonth()===mo){r.push(new Date(d));d.setDate(d.getDate()+7);}
  return r;
}
function fmt(d){return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0');}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}

function buildMonth(mi){
  const m=mi+2;
  const isMarch=mi===0;
  const isApril=mi===1;
  const e=[];
  getDates(2026,m,2).forEach((d,i)=>{
    if(isMarch&&d<TODAY)return;
    e.push({d,day:'Terça',ord:ORD[i],type:'p',idx:i<4?i:4});
  });
  getDates(2026,m,3).forEach((d,i)=>{
    if(isMarch&&d<TODAY)return;
    e.push({d,day:'Quarta',ord:ORD[i],type:'w',idx:i%2});
  });
  getDates(2026,m,0).forEach((d,i)=>{
    if(isMarch&&d<TODAY)return;
    let idx=i<4?i:4;
    if(isApril){
      if(i===0)idx=2;
      else if(i===1)idx=0;
    }
    e.push({d,day:'Domingo',ord:ORD[i],type:'p',idx});
  });
  e.sort((a,b)=>a.d-b.d);
  return e;
}

const nav=document.getElementById('mnav');
function setActive(i){nav.querySelectorAll('button').forEach((b,j)=>b.classList.toggle('on',j===i));}
MN.forEach((m,i)=>{
  const btn=document.createElement('button');
  btn.textContent=m;btn.className='mbtn';
  btn.addEventListener('click',()=>{setActive(i);render(i);});
  nav.appendChild(btn);
});
setActive(0);

function render(mi){
  const rows=buildMonth(mi);
  const el=document.getElementById('rows');
  el.innerHTML='';
  const counts={};
  P.forEach((_,i)=>counts['p'+i]=0);
  W.forEach((_,i)=>counts['w'+i]=0);
  let prevDay='';
  rows.forEach(e=>{
    const s=e.type==='p'?P[e.idx]:W[e.idx];
    counts[e.type+e.idx]=(counts[e.type+e.idx]||0)+1;
    if(prevDay&&prevDay!==e.day){const dv=document.createElement('div');dv.className='divider';el.appendChild(dv);}
    prevDay=e.day;
    const isRes=e.type==='p'&&e.idx===4;
    const isToday=sameDay(e.d,TODAY);
    const row=document.createElement('div');row.className='row';
    row.innerHTML=`<span class="r-date">${fmt(e.d)}${isToday?'<span class="hoje-badge">hoje</span>':''}</span><span class="r-day">${e.day}</span><span class="r-ord">${e.ord}</span><span><span class="badge" style="background:${s.bg};color:${s.c};">${s.l}${isRes?' *':''}</span></span>`;
    el.appendChild(row);
  });
  const st=document.getElementById('stats');st.innerHTML='';
  [...P.map((x,i)=>({...x,cnt:counts['p'+i],res:i===4})),...W.map((x,i)=>({...x,cnt:counts['w'+i]}))]
    .forEach(x=>{
      const d=document.createElement('div');d.className='stat';
      d.innerHTML=`<div class="stat-name">${x.l}${x.res?' *':''}</div><div class="stat-num">${x.cnt}<span> cultos</span></div>`;
      st.appendChild(d);
    });
  const noteEl=document.getElementById('note');
  const notes=[];
  notes.push('* Manassés & Jailma servem apenas nos meses com 5ª terça ou 5º domingo.');
  if(mi===0)notes.push('Março exibe apenas os cultos a partir do dia 15.');
  if(mi===1)notes.push('** Abril: Luiz & Janaina no 1º domingo; Eduardo & Aparecida no 2º domingo.');
  noteEl.innerHTML=notes.join('<br>');
}
render(0);
</script>
